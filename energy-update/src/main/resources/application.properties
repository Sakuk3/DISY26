spring.application.name=EnergyUpdate
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${POSTGRES_DB:disy26}?currentSchema=${APP_DB_SCHEMA:api}
spring.datasource.username=${APP_DB_USER:disy26_api}
spring.datasource.password=${APP_DB_PASSWORD:disy26_api_pw}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.properties.hibernate.default_schema=${APP_DB_SCHEMA:api}
spring.flyway.schemas=${APP_DB_SCHEMA:api}
spring.flyway.default-schema=${APP_DB_SCHEMA:api}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
